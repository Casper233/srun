name: Build srun for MIPS

# 触发条件：push代码 / 手动触发
on:
  push:
    branches: [ master ]
  workflow_dispatch:  # 允许手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 源码
        uses: actions/checkout@v4

      - name: 安装 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'  # srun 推荐版本

      - name: 编译 MIPS 小端版 (mipsel，你的路由器99%用这个)
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=mipsle go build -ldflags="-w -s" -o srun-mipsel
      
      - name: 编译 MIPS 大端版 (备用)
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=mips go build -ldflags="-w -s" -o srun-mips

      - name: 上传编译好的二进制文件
        uses: actions/upload-artifact@v4
        with:
          name: srun-mips
          path: |
            srun-mipsel
            srun-mips
