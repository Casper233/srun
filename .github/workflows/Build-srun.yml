name: Build srun for MIPS

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 源码
        uses: actions/checkout@v4

      - name: 安装 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: 初始化 Go 模块（修复错误）
        run: go mod init srun && go mod tidy

      - name: 编译 MIPS 小端（mipsel，你的路由器用这个）
        run: CGO_ENABLED=0 GOOS=linux GOARCH=mipsle go build -ldflags="-w -s" -o srun-mipsel

      - name: 编译 MIPS 大端（备用）
        run: CGO_ENABLED=0 GOOS=linux GOARCH=mips go build -ldflags="-w -s" -o srun-mips

      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: srun-mips
          path: |
            srun-mipsel
            srun-mips
